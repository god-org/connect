name: Build

on:
  workflow_dispatch:
    inputs:
      f_rbld:
        description: 强制构建
        type: boolean

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TZ: Asia/Shanghai

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      sc_ver: ${{ steps.get.outputs.sc_ver }}
      sc_upd: ${{ steps.get.outputs.sc_upd }}
      msg: ${{ steps.get.outputs.msg }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 获取信息
        id: get
        env:
          SC_SRC: gotoh/ssh-connect
        run: |
          while IFS=: read -r key val; do
            [[ $key == *connect* ]] && sc_old=${val//[[:space:]]/}
            [[ $sc_old ]] && break
          done <README.md

          sc_ver=$(gh api "/repos/$SC_SRC/tags" -q '.[0].name')

          [[ $sc_old != "$sc_ver" ]] && sc_upd=1 || sc_upd=0

          printf '%s\n' "sc_ver=$sc_ver" "sc_upd=$sc_upd" >>"$GITHUB_OUTPUT"

          ((sc_upd)) || exit 0
          printf -v now_t '%(%F %T)T' -1
          msg="$now_t Build to $sc_ver"
          printf '%s\n' "msg=$msg" >>"$GITHUB_OUTPUT"

  build:
    needs:
      - check
    runs-on: ubuntu-latest
    if: needs.check.outputs.msg != '' || inputs.f_rbld
    steps:
      - name: 配置 QEMU 跨架构支持
        uses: docker/setup-qemu-action@v4

      - name: 配置 Docker Buildx 构建工具
        uses: docker/setup-buildx-action@v4

      - name: 登录 Docker 镜像仓库
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录 GHCR 镜像仓库
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v7
        with:
          platforms: |
            linux/amd64,linux/arm64,linux/riscv64,linux/ppc64le
            linux/s390x,linux/386,linux/arm/v7,linux/arm/v6
          outputs: type=local,dest=dst
          build-args: SC_VER=${{ needs.check.outputs.sc_ver }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 上传固件至 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dst/*/connect-*.tar.gz
          tag_name: ${{ needs.check.outputs.sc_ver }}

  mark:
    needs:
      - check
      - build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success' && !cancelled()
    steps:
      - name: 检出全部代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 更新版本信息
        env:
          SC_VER: ${{ needs.check.outputs.sc_ver }}
          SC_UPD: ${{ needs.check.outputs.sc_upd }}
        run: |
          ((!SC_UPD)) || sed -i "/\*\*connect\*\*/ s|:.*|: $SC_VER|" README.md

      - name: 提交代码
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: ${{ needs.check.outputs.msg }}

      - name: 发送结果至 Telegram
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            <b>🚀 Connect 构建报告</b>

            ${{ job.status == 'success' && '✅ 成功' || '❌ 失败' }}

            <b>📦 项目信息</b>
            仓库：<code>${{ github.repository }}</code>
            分支：<code>${{ github.ref_name }}</code>
            编号：<code>${{ github.run_number }}</code>
            版本：<code>${{ needs.check.outputs.sc_ver }}</code>

            <b>👤 触发信息</b>
            账号：<code>${{ github.actor }}</code>
            触发：<code>${{ github.event_name }}</code>
            哈希：<code>${{ github.sha }}</code>
            提交：<code>${{ needs.check.outputs.msg }}</code>

            <b>🔗 快速链接</b>
            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">📋 查看完整日志</a>
            <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">💻 查看代码变更</a>
